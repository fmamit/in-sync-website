name: Service Agent Bug Fix Pipeline

# Triggered by webhook call from agent backend via repository_dispatch
on:
  repository_dispatch:
    types: [bug-fix]

jobs:
  fix_and_notify:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.AGENT_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.AGENT_SUPABASE_SERVICE_KEY }}
      CRM_WEBHOOK_URL: ${{ secrets.CRM_WEBHOOK_URL }}
      CRM_ORG_ID: ${{ secrets.CRM_ORG_ID }}
      CRM_CREATED_BY: ${{ secrets.CRM_CREATED_BY }}
      CRM_CREATED_BY_NAME: ${{ secrets.CRM_CREATED_BY_NAME }}
      TICKET_ID: ${{ github.event.client_payload.ticket_id }}
      PROJECT_NAME: ${{ github.event.client_payload.project_name }}
      ISSUE_DESCRIPTION: ${{ github.event.client_payload.issue }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code headless fix
        id: claude_fix
        run: |
          set +e
          FIX_OUTPUT=$(claude --print "Fix this issue: ${ISSUE_DESCRIPTION}
          Rules: fix only the broken action, do not touch unrelated files.
          Create a branch named fix/${TICKET_ID} and commit the fix." 2>&1)
          FIX_EXIT_CODE=$?
          echo "fix_exit_code=${FIX_EXIT_CODE}" >> $GITHUB_OUTPUT

          # Truncate output for GitHub env (max 1MB)
          FIX_OUTPUT_TRUNCATED=$(echo "$FIX_OUTPUT" | head -c 50000)
          echo "fix_output<<EOF_FIX" >> $GITHUB_OUTPUT
          echo "$FIX_OUTPUT_TRUNCATED" >> $GITHUB_OUTPUT
          echo "EOF_FIX" >> $GITHUB_OUTPUT

          if [ $FIX_EXIT_CODE -eq 0 ]; then
            echo "fix_status=success" >> $GITHUB_OUTPUT
          else
            echo "fix_status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes and create PR
        id: create_pr
        if: steps.claude_fix.outputs.fix_status == 'success'
        run: |
          git config user.name "In-Sync Service Agent"
          git config user.email "support@in-sync.co.in"

          BRANCH_NAME="fix/${TICKET_ID}"

          # Check if there are any changes to commit
          if [ -z "$(git status --porcelain)" ]; then
            echo "pr_status=no_changes" >> $GITHUB_OUTPUT
            echo "No changes detected after Claude Code fix attempt."
            exit 0
          fi

          # Create branch and commit
          git checkout -b "$BRANCH_NAME"
          git add -A
          git commit -m "fix: ${ISSUE_DESCRIPTION}

          Automated fix by In-Sync Service Agent pipeline.
          Ticket: ${TICKET_ID}
          Project: ${PROJECT_NAME}"

          git push origin "$BRANCH_NAME"

          # Create PR using GitHub API
          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -d "{
              \"title\": \"fix: ${ISSUE_DESCRIPTION}\",
              \"body\": \"## Automated Bug Fix\\n\\n**Ticket:** \`${TICKET_ID}\`\\n**Project:** ${PROJECT_NAME}\\n**Issue:** ${ISSUE_DESCRIPTION}\\n\\n---\\nGenerated by In-Sync Service Agent Pipeline\",
              \"head\": \"${BRANCH_NAME}\",
              \"base\": \"main\"
            }")

          PR_URL=$(echo "$PR_RESPONSE" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');try{console.log(JSON.parse(d).html_url||'')}catch{console.log('')}")
          PR_NUMBER=$(echo "$PR_RESPONSE" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');try{console.log(JSON.parse(d).number||'')}catch{console.log('')}")

          if [ -n "$PR_URL" ] && [ "$PR_URL" != "undefined" ] && [ "$PR_URL" != "null" ]; then
            echo "pr_status=created" >> $GITHUB_OUTPUT
            echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT
            echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
            echo "PR created: $PR_URL"
          else
            echo "pr_status=failed" >> $GITHUB_OUTPUT
            echo "Failed to create PR. Response: $PR_RESPONSE"
          fi

      - name: Determine pipeline outcome
        id: outcome
        run: |
          FIX_STATUS="${{ steps.claude_fix.outputs.fix_status }}"
          PR_STATUS="${{ steps.create_pr.outputs.pr_status }}"
          PR_URL="${{ steps.create_pr.outputs.pr_url }}"

          if [ "$FIX_STATUS" == "success" ] && [ "$PR_STATUS" == "created" ]; then
            echo "result=pr_raised" >> $GITHUB_OUTPUT
            echo "crm_status=in_progress" >> $GITHUB_OUTPUT
            echo "crm_priority=medium" >> $GITHUB_OUTPUT
            echo "agent_status=in_progress" >> $GITHUB_OUTPUT
            echo "resolution_notes=PR ${PR_URL} — fix committed and ready for review." >> $GITHUB_OUTPUT
            echo "resolved_at=" >> $GITHUB_OUTPUT
          elif [ "$FIX_STATUS" == "success" ] && [ "$PR_STATUS" == "no_changes" ]; then
            echo "result=resolved" >> $GITHUB_OUTPUT
            echo "crm_status=resolved" >> $GITHUB_OUTPUT
            echo "crm_priority=medium" >> $GITHUB_OUTPUT
            echo "agent_status=resolved" >> $GITHUB_OUTPUT
            echo "resolution_notes=Issue investigated — no code changes required. The action is working correctly." >> $GITHUB_OUTPUT
            echo "resolved_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
            echo "crm_status=new" >> $GITHUB_OUTPUT
            echo "crm_priority=high" >> $GITHUB_OUTPUT
            echo "agent_status=open" >> $GITHUB_OUTPUT
            echo "resolution_notes=Automated fix attempted but failed. Manual investigation required." >> $GITHUB_OUTPUT
            echo "resolved_at=" >> $GITHUB_OUTPUT
          fi

      - name: Build CRM description
        id: description
        run: |
          RESULT="${{ steps.outcome.outputs.result }}"

          if [ "$RESULT" == "pr_raised" ]; then
            DESC="A fix for ${ISSUE_DESCRIPTION} on ${PROJECT_NAME} has been committed and a pull request created. Action needed: review and approve the PR to deploy the fix."
          elif [ "$RESULT" == "resolved" ]; then
            DESC="The reported issue (${ISSUE_DESCRIPTION}) on ${PROJECT_NAME} was investigated. No code changes were required. The action is now working correctly. No further action needed."
          else
            DESC="An automated fix was attempted for ${ISSUE_DESCRIPTION} on ${PROJECT_NAME} but was unsuccessful. Manual investigation is required by the support team."
          fi

          echo "text<<EOF_DESC" >> $GITHUB_OUTPUT
          echo "$DESC" >> $GITHUB_OUTPUT
          echo "EOF_DESC" >> $GITHUB_OUTPUT

      - name: Update agent ticket store
        id: agent_update
        run: |
          AGENT_STATUS="${{ steps.outcome.outputs.agent_status }}"

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "${SUPABASE_URL}/rest/v1/tickets?ticket_id=eq.${TICKET_ID}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\": \"${AGENT_STATUS}\", \"assigned_to\": \"service_agent_pipeline\"}")

          echo "Agent ticket store update HTTP status: $RESPONSE"

          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "agent_update=success" >> $GITHUB_OUTPUT
          else
            echo "agent_update=failed" >> $GITHUB_OUTPUT
            echo "::warning::Failed to update agent ticket store (HTTP $RESPONSE)"
          fi

      - name: POST to CRM webhook with retry
        id: crm_post
        run: |
          CRM_STATUS="${{ steps.outcome.outputs.crm_status }}"
          CRM_PRIORITY="${{ steps.outcome.outputs.crm_priority }}"
          RESOLUTION_NOTES="${{ steps.outcome.outputs.resolution_notes }}"
          RESOLVED_AT="${{ steps.outcome.outputs.resolved_at }}"
          DESCRIPTION="${{ steps.description.outputs.text }}"

          # Build resolved_at as proper JSON (null or quoted string)
          if [ -z "$RESOLVED_AT" ]; then
            RESOLVED_AT_JSON="null"
          else
            RESOLVED_AT_JSON="\"${RESOLVED_AT}\""
          fi

          PAYLOAD=$(cat <<PAYLOAD_EOF
          {
            "ticket_number": "${TICKET_ID}",
            "subject": "${ISSUE_DESCRIPTION}",
            "description": "${DESCRIPTION}",
            "category": "bug",
            "priority": "${CRM_PRIORITY}",
            "status": "${CRM_STATUS}",
            "resolution_notes": "${RESOLUTION_NOTES}",
            "resolved_at": ${RESOLVED_AT_JSON},
            "company_name": "${PROJECT_NAME}",
            "contact_email": "support@in-sync.co.in",
            "source": "service_agent_pipeline",
            "org_id": "${CRM_ORG_ID}",
            "created_by": "${CRM_CREATED_BY}",
            "contact_name": "${CRM_CREATED_BY_NAME}"
          }
          PAYLOAD_EOF
          )

          # Exponential backoff retry: 2s, 4s, 8s
          MAX_RETRIES=3
          RETRY_DELAY=2
          CRM_SUCCESS=false

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /tmp/crm_response.txt -w "%{http_code}" -X POST \
              "${CRM_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            echo "CRM webhook attempt $i: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              CRM_SUCCESS=true
              echo "crm_post=success" >> $GITHUB_OUTPUT
              echo "CRM webhook POST succeeded."
              break
            fi

            # Only retry on 429 (rate limit) or 503 (service unavailable)
            if [ "$HTTP_CODE" == "429" ] || [ "$HTTP_CODE" == "503" ]; then
              if [ $i -lt $MAX_RETRIES ]; then
                echo "Retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
                RETRY_DELAY=$((RETRY_DELAY * 2))
              fi
            else
              echo "Non-retryable error (HTTP $HTTP_CODE). Skipping retries."
              break
            fi
          done

          if [ "$CRM_SUCCESS" != "true" ]; then
            echo "crm_post=failed" >> $GITHUB_OUTPUT
            echo "crm_payload<<EOF_PAYLOAD" >> $GITHUB_OUTPUT
            echo "$PAYLOAD" >> $GITHUB_OUTPUT
            echo "EOF_PAYLOAD" >> $GITHUB_OUTPUT
            echo "::error::CRM webhook POST failed after all retries (last HTTP $HTTP_CODE)"
          fi

      - name: Fallback — notify on CRM webhook failure
        if: steps.crm_post.outputs.crm_post == 'failed'
        run: |
          PAYLOAD="${{ steps.crm_post.outputs.crm_payload }}"

          echo "::error::CRM webhook failed. Payload that was not delivered:"
          echo "$PAYLOAD"

          # Send fallback email via GitHub Actions (using curl to a mail API)
          # If you have SendGrid, Mailgun, or similar configured, replace this.
          # For now, log the full payload so it can be recovered.
          echo "========================================="
          echo "FALLBACK: CRM webhook POST failed."
          echo "Ticket: ${TICKET_ID}"
          echo "Project: ${PROJECT_NAME}"
          echo "The agent ticket store was still updated."
          echo "Manual action required: POST the payload below to the CRM webhook."
          echo "========================================="
          echo "$PAYLOAD"

          # The agent ticket store was already updated in the previous step
          # (even if CRM fails) — so the systems are not both inconsistent.
