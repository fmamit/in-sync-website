name: Agent Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'agent-backend/**'
  workflow_dispatch:

jobs:
  deploy_backend:
    runs-on: ubuntu-latest
    name: Deploy Agent Backend
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGENT_BACKEND }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "agent-backend/app"
          api_location: "agent-backend/api"
          output_location: ""
          skip_app_build: true
          skip_api_build: false
